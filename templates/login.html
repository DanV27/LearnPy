<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Login — LearnPy</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&amp;family=Geist:wght@400;500;600;700&amp;family=Space+Mono:wght@400;500&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "secondary-container": "#fb6d25",
            "primary": "#000000",
            "surface-container-high": "#e8e8e8",
            "on-surface": "#1b1b1b",
            "background": "#f9f9f9",
            "surface-variant": "#e2e2e2",
            "outline": "#7e7576",
            "outline-variant": "#cfc4c5",
            "on-background": "#1b1b1b",
            "surface": "#f9f9f9",
            "on-surface-variant": "#4c4546",
            "surface-container-low": "#f3f3f3",
            "error-container": "#ffdad6",
            "error": "#ba1a1a",
            "surface-container": "#eeeeee",
            "surface-container-lowest": "#ffffff",
            "primary-container": "#fb6d25"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "spacing": {
            "margin": "32px", "md": "24px", "lg": "48px", "gutter": "24px",
            "xs": "8px", "sm": "16px", "base": "4px", "xl": "80px"
          },
          "fontFamily": {
            "body-lg": ["Space Grotesk"],
            "body-md": ["Space Grotesk"],
            "label-technical": ["Space Mono"],
            "headline-xl": ["Space Grotesk"],
            "headline-lg": ["Space Grotesk"],
            "headline-md": ["Space Grotesk"]
          },
          "fontSize": {
            "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
            "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
            "label-technical": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "500" }],
            "headline-xl": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
            "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
            "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 20px;
    }
    .grid-overlay {
      background-image: radial-gradient(circle, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    body { font-family: 'Space Grotesk', sans-serif; }
  </style>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col grid-overlay">
  <!-- TopNavBar -->
  <header class="flex justify-between items-center w-full px-md h-32 border-b border-white/10 bg-black sticky top-0 z-50">
    <div class="flex items-center gap-lg">
      <a href="/" class="flex items-center gap-xs">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="LearnPy logo"
          class="h-28 w-28 rounded-lg" style="image-rendering: pixelated;" />
        <span class="font-headline-md text-headline-md font-bold text-white uppercase tracking-tighter">LEARNPY</span>
      </a>
    </div>
    <div class="flex items-center gap-md">
      <a href="{{ url_for('signup') }}"
        class="text-white/60 hover:text-white transition-colors font-label-technical text-label-technical">Sign up</a>
    </div>
  </header>

  <!-- Centered card -->
  <main class="flex-grow flex items-center justify-center px-md py-lg">
    <div class="w-full max-w-md flex flex-col gap-md">
      <div class="flex items-center gap-md">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="LearnPy mascot"
          class="h-20 w-20 rounded-xl border border-outline-variant bg-[#1b1b1b] shadow-md"
          style="image-rendering: pixelated;" />
        <div class="flex flex-col gap-xs">
          <span class="font-label-technical text-label-technical text-outline uppercase tracking-wider">// Authenticate</span>
          <h1 class="font-headline-xl text-headline-xl text-on-surface">Log In</h1>
          <p class="font-body-md text-on-surface-variant">Welcome back. Pick up your next Python lesson.</p>
        </div>
      </div>

      <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg">
        <form id="login-form" class="flex flex-col gap-md">
          <div class="flex flex-col gap-xs">
            <label class="font-label-technical text-label-technical text-outline uppercase tracking-wider" for="identifier">Username or email</label>
            <input type="text" id="identifier" name="identifier" required autocomplete="username" placeholder="Username or email"
              class="w-full bg-surface-container-low border border-outline-variant rounded-lg p-sm font-label-technical text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" />
          </div>

          <div class="flex flex-col gap-xs">
            <div class="flex items-center justify-between">
              <label class="font-label-technical text-label-technical text-outline uppercase tracking-wider" for="password">Password</label>
              <a href="{{ url_for('forgot_password_page') }}" class="font-label-technical text-label-technical text-secondary-container hover:brightness-110 underline decoration-secondary-container/40">Forgot password?</a>
            </div>
            <input type="password" id="password" name="password" required autocomplete="current-password"
              class="w-full bg-surface-container-low border border-outline-variant rounded-lg p-sm font-label-technical text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" />
          </div>

          <div id="error" class="hidden bg-error-container text-error border border-error/30 px-sm py-xs rounded-lg font-label-technical text-label-technical"></div>

          <button id="submit-btn" type="submit"
            class="w-full bg-secondary-container text-white h-12 rounded-lg font-headline-md text-headline-md font-bold hover:brightness-110 transition-all flex items-center justify-center gap-sm shadow-lg active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
            <span id="submit-icon" class="material-symbols-outlined" data-icon="login" style="font-variation-settings: 'FILL' 1;">login</span>
            <span id="submit-label">LOG IN</span>
          </button>
        </form>
      </div>

      <form action="{{ url_for('start_guest_session') }}" method="post">
        <button type="submit"
          class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface h-12 rounded-lg font-label-technical text-label-technical hover:bg-surface-container-low transition-all">
          Continue as guest
        </button>
      </form>

      <p class="font-body-md text-on-surface-variant text-center">
        Don't have an account?
        <a href="{{ url_for('signup') }}" class="text-secondary-container hover:brightness-110 underline decoration-secondary-container/40">Sign up</a>
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full flex justify-between items-center px-sm py-xs border-t border-white/10 bg-black">
    <div class="flex items-center gap-lg">
      <a class="text-white hover:text-white/80 transition-colors font-label-technical text-label-technical underline decoration-white/20"
        href="https://github.com/danv27" target="_blank">Created by Daniel Valenzuela</a>
      <span class="font-label-technical text-label-technical text-white/60">©2026</span>
    </div>
    <div class="flex gap-md">
      <span class="font-label-technical text-label-technical text-white/60">Status: Optimal</span>
      <span class="font-label-technical text-label-technical text-white">V:1.1</span>
    </div>
  </footer>

  <script>
    (function () {
      const form = document.getElementById('login-form');
      const errorDiv = document.getElementById('error');
      const submitBtn = document.getElementById('submit-btn');
      const submitIcon = document.getElementById('submit-icon');
      const submitLabel = document.getElementById('submit-label');

      function setLoading(loading) {
        submitBtn.disabled = loading;
        if (loading) {
          submitIcon.textContent = 'progress_activity';
          submitIcon.classList.add('animate-spin');
          submitLabel.textContent = 'LOGGING IN...';
        } else {
          submitIcon.textContent = 'login';
          submitIcon.classList.remove('animate-spin');
          submitLabel.textContent = 'LOG IN';
        }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorDiv.classList.add('hidden');
        const identifier = document.getElementById('identifier').value.trim();
        const password = document.getElementById('password').value;

        setLoading(true);
        try {
          const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ identifier, password })
          });
          const data = await res.json();

          if (!res.ok) {
            errorDiv.textContent = data.error || 'Login failed.';
            errorDiv.classList.remove('hidden');
            return;
          }
          window.location.href = data.redirect || '/';
        } catch (err) {
          errorDiv.textContent = 'Network error: ' + err.message;
          errorDiv.classList.remove('hidden');
        } finally {
          setLoading(false);
        }
      });
    })();
  </script>
</body>

</html>
