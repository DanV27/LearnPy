<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>About — LearnPy</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&amp;family=Geist:wght@400;500;600;700&amp;family=Space+Mono:wght@400;500&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#474747",
                        "secondary-container": "#fb6d25",
                        "primary": "#000000",
                        "surface-container-high": "#e8e8e8",
                        "on-tertiary-container": "#848484",
                        "on-surface": "#1b1b1b",
                        "background": "#f9f9f9",
                        "on-error": "#ffffff",
                        "on-primary-container": "#848484",
                        "surface-variant": "#e2e2e2",
                        "inverse-primary": "#c6c6c6",
                        "outline": "#7e7576",
                        "on-tertiary-fixed": "#1b1b1b",
                        "outline-variant": "#cfc4c5",
                        "on-primary": "#ffffff",
                        "on-background": "#1b1b1b",
                        "surface-bright": "#f9f9f9",
                        "on-tertiary-fixed-variant": "#474747",
                        "surface": "#f9f9f9",
                        "on-secondary-fixed": "#360f00",
                        "on-secondary-container": "#591e00",
                        "surface-dim": "#dadada",
                        "on-surface-variant": "#4c4546",
                        "surface-tint": "#5e5e5e",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#ffb597",
                        "surface-container-low": "#f3f3f3",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "surface-container": "#eeeeee",
                        "secondary-fixed": "#ffdbcd",
                        "primary-fixed": "#e2e2e2",
                        "primary-fixed-dim": "#c6c6c6",
                        "secondary": "#a43d00",
                        "tertiary": "#000000",
                        "tertiary-container": "#1b1b1b",
                        "tertiary-fixed": "#e2e2e2",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#f1f1f1",
                        "primary-container": "#fb6d25",
                        "on-secondary-fixed-variant": "#7d2d00",
                        "tertiary-fixed-dim": "#c6c6c6",
                        "inverse-surface": "#303030",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#e2e2e2",
                        "on-primary-fixed": "#1b1b1b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin": "32px",
                        "md": "24px",
                        "lg": "48px",
                        "gutter": "24px",
                        "xs": "8px",
                        "sm": "16px",
                        "base": "4px",
                        "xl": "80px",
                        "grid-gutter": "1px"
                    },
                    "fontFamily": {
                        "body-lg": ["Space Grotesk"],
                        "body-md": ["Space Grotesk"],
                        "label-technical": ["Space Mono"],
                        "headline-xl": ["Space Grotesk"],
                        "headline-lg": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-technical": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "headline-xl": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }

        .grid-overlay {
            background-image: radial-gradient(circle, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1b1b1b;
        }

        ::-webkit-scrollbar-thumb {
            background: #474747;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #7e7576;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
        }

        .tech-label {
            font-family: 'Space Mono', monospace;
        }
    </style>
</head>

<body>

    <body class="bg-background text-on-background min-h-screen flex flex-col grid-overlay">
        <!-- TopAppBar — matches the Learn page styling -->
        <header class="w-full top-0 bg-surface border-b border-outline-variant z-40 sticky">
            <div class="flex justify-between items-center px-margin py-sm max-w-7xl mx-auto">
                <div class="flex items-center gap-md">
                    <button id="open-sidebar" aria-label="Open topics"
                        class="p-xs rounded-lg hover:bg-surface-container transition-colors flex items-center gap-xs text-primary">
                        <span class="material-symbols-outlined" style="font-size: 24px;">menu</span>
                        <span class="hidden sm:inline font-label-md text-label-md">Topics</span>
                    </button>
                    <a href="/" class="flex items-center gap-xs">
                        <img src="{{ url_for('static', filename='logo.png') }}" alt="LearnPy logo"
                            class="h-28 w-28 rounded-lg" style="image-rendering: pixelated;" />
                        <span class="font-headline-md text-headline-md font-bold text-primary">LearnPy</span>
                    </a>
                    <nav class="hidden md:flex gap-md font-body-md text-body-md ml-md">
                        <a class="text-on-surface-variant hover:text-secondary transition-colors duration-200 cursor-pointer"
                            href="/">Learn</a>
                        <a class="text-on-surface-variant hover:text-secondary transition-colors duration-200 cursor-pointer"
                            href="/about">About</a>
                    </nav>
                </div>
                <div class="flex items-center gap-sm">
                    {% if current_user.is_authenticated %}
                    <span class="text-primary font-bold border-b-2 border-secondary cursor-pointer"">
          <a href=" {{ url_for('profile') }}"> {{ current_user.username }} </a>
                    </span>
                    <a href="{{ url_for('logout') }}"
                        class="bg-primary text-on-primary px-md py-xs font-label-md text-label-md cursor-pointer active:opacity-80 rounded-lg">
                        Logout
                    </a>
                    {% else %}
                    <a href="{{ url_for('login') }}"
                        class="bg-primary text-on-primary px-md py-xs font-label-md text-label-md cursor-pointer active:opacity-80 rounded-lg">
                        Log In
                    </a>
                    {% endif %}
                </div>
            </div>
        </header>

        <!-- Sidebar overlay -->
        <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/40 z-40 transition-opacity"></div>

        <!-- Sidebar drawer -->
        <aside id="sidebar"
            class="fixed top-0 left-0 h-full w-72 bg-surface-container-lowest border-r border-outline-variant shadow-2xl z-50 transform -translate-x-full transition-transform duration-200 ease-out flex flex-col">
            <div class="flex items-center justify-between px-md py-md border-b border-outline-variant">
                <div class="flex items-center gap-xs">
                    <span class="material-symbols-outlined text-primary">menu_book</span>
                    <span class="font-headline-md text-headline-md text-primary">Topics</span>
                </div>
                <button id="close-sidebar" aria-label="Close topics"
                    class="p-xs rounded-lg hover:bg-surface-container transition-colors text-on-surface-variant">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <nav class="flex-1 overflow-y-auto py-xs">
                {% for t in all_topics %}
                <a href="{{ url_for('lesson_page', slug=t.slug) }}"
                    class="flex items-center gap-sm px-md py-sm transition-colors text-on-surface-variant hover:bg-surface-container-low border-l-4 border-transparent">
                    <span class="material-symbols-outlined shrink-0" style="font-size: 22px;">{{ t.icon }}</span>
                    <span class="font-body-md text-body-md truncate">{{ t.name }}</span>
                </a>
                {% endfor %}
            </nav>
            <div class="border-t border-outline-variant px-md py-sm">
                <p class="font-label-md text-label-md text-on-surface-variant">
                    Can't find your topic? Use the search to ask anything.
                </p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-grow flex justify-center px-md py-lg pb-24">
            <div class="w-full max-w-4xl flex flex-col gap-lg">

                <!-- Sidebar drawer open/close — same behavior as the Learn page -->
                <script>
                        (function () {
                            const sidebar = document.getElementById('sidebar');
                            const overlay = document.getElementById('sidebar-overlay');
                            const openBtn = document.getElementById('open-sidebar');
                            const closeBtn = document.getElementById('close-sidebar');

                            function openSidebar() {
                                sidebar.classList.remove('-translate-x-full');
                                overlay.classList.remove('hidden');
                                document.body.classList.add('overflow-hidden');
                            }
                            function closeSidebar() {
                                sidebar.classList.add('-translate-x-full');
                                overlay.classList.add('hidden');
                                document.body.classList.remove('overflow-hidden');
                            }
                            openBtn.addEventListener('click', openSidebar);
                            closeBtn.addEventListener('click', closeSidebar);
                            overlay.addEventListener('click', closeSidebar);
                            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSidebar(); });
                        })();
                </script>
    </body>

</html>
